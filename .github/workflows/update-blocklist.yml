name: Update Blocklist

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC
  workflow_dispatch:        # Allow manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate blocklist
        run: ./generate.sh

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet blocklist.txt metadata.json || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          DOMAIN_COUNT=$(jq -r '.domain_count' metadata.json)
          git add blocklist.txt metadata.json
          git commit -m "Update blocklist: ${DOMAIN_COUNT} domains ($(date -u +%Y-%m-%d))"
          git push
